title: Suspicious Scheduled Task Creation
id: 3a9d1e4f-7c2b-4e8a-b5f6-9d0c3e7a1b4d
status: production
description: Detects creation of scheduled tasks via schtasks.exe or PowerShell,
  particularly those using suspicious patterns like running from temp directories,
  executing encoded commands, or using uncommon frequencies. Persistence via scheduled
  tasks is a common post-exploitation technique.
references:
  - https://attack.mitre.org/techniques/T1053/005/
  - https://www.elastic.co/guide/en/security/current/persistence-via-scheduled-job.html
author: SOC Team
date: 2026-01-01
tags:
  - attack.persistence
  - attack.t1053.005
  - attack.privilege_escalation
logsource:
  category: process_creation
  product: windows
detection:
  selection_schtasks:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains: '/create'
  selection_suspicious_location:
    CommandLine|contains:
      - '\Temp\'
      - '\AppData\Local\Temp\'
      - '\AppData\Roaming\'
      - '%TEMP%'
      - '%APPDATA%'
      - 'C:\Users\Public\'
      - 'C:\ProgramData\'
  selection_suspicious_cmd:
    CommandLine|contains:
      - 'powershell'
      - 'cmd.exe /c'
      - 'wscript'
      - 'cscript'
      - 'mshta'
      - 'regsvr32'
      - 'rundll32'
      - 'certutil'
      - '-enc'
      - '-EncodedCommand'
  selection_ps_task:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'New-ScheduledTask'
      - 'Register-ScheduledTask'
      - 'ScheduledTask'
  filter_legitimate:
    ParentImage|endswith:
      - '\services.exe'
      - '\svchost.exe'
      - '\taskeng.exe'
    CommandLine|contains:
      - 'Microsoft'
      - 'Windows'
  condition: >
    (selection_schtasks and (selection_suspicious_location or selection_suspicious_cmd))
    or (selection_ps_task and selection_suspicious_location)
    and not filter_legitimate
falsepositives:
  - Software installers creating legitimate scheduled tasks
  - IT management tools (SCCM, PDQ, etc.)
  - Tune filter_legitimate with known-good task names per environment
level: high
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - Image
response:
  - Review scheduled task details and the binary/script it executes
  - Check if the executed file is malicious (hash via VirusTotal)
  - Investigate parent process for signs of initial compromise
  - Check for additional persistence mechanisms on the same host
playbook: https://github.com/reninjk/soc-incident-response/blob/main/playbooks/malware-detection.md
