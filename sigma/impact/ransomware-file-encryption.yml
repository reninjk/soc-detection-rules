title: Ransomware File Encryption Activity
id: b2c3d4e5-f6a7-8901-bcde-f01234567890
status: production
description: Detects mass file rename/modification events consistent with ransomware encryption. Triggers on rapid bulk file operations with extension changes.
references:
  - https://attack.mitre.org/techniques/T1486/
  - https://attack.mitre.org/techniques/T1490/
author: SOC Team
date: 2026-05-01
tags:
  - attack.impact
  - attack.t1486
  - attack.t1490
logsource:
  category: file_event
  product: windows
detection:
  selection_extensions:
    TargetFilename|endswith:
      - '.locked'
      - '.encrypted'
      - '.enc'
      - '.crypted'
      - '.crypt'
      - '.ransom'
      - '.wnry'
      - '.wncry'
  selection_shadow_copy:
    CommandLine|contains:
      - 'vssadmin delete shadows'
      - 'wbadmin delete catalog'
      - 'bcdedit /set recoveryenabled no'
      - 'wmic shadowcopy delete'
  condition: selection_extensions | count() > 20 OR selection_shadow_copy
falsepositives:
  - Legitimate file encryption software (e.g., VeraCrypt bulk operations)
  - Backup software with compression
level: critical
fields:
  - TargetFilename
  - Image
  - ProcessId
  - User
playbook: ../../soc-incident-response/playbooks/ransomware-response.md
response: ISOLATE_IMMEDIATELY
tuning_notes: |
  This rule should NEVER be tuned to be less sensitive — ransomware FPs are
  acceptable given the critical impact. Investigate ALL alerts.
  Threshold of 20 files can be adjusted per environment baseline.
