title: Suspicious Office Document Macro Execution
id: 1a4f7d2e-8c3b-4e9f-a1d6-3b7c5f9e2a8d
status: production
description: Detects execution of child processes spawned from Microsoft Office
  applications (Word, Excel, PowerPoint), which is a strong indicator of malicious
  macro execution used for initial access via phishing documents.
references:
  - https://attack.mitre.org/techniques/T1566/001/
  - https://attack.mitre.org/techniques/T1059/005/
  - https://lolbas-project.github.io/
author: SOC Team
date: 2026-01-01
tags:
  - attack.initial_access
  - attack.t1566.001
  - attack.execution
  - attack.t1059.005
logsource:
  category: process_creation
  product: windows
detection:
  selection_office_parent:
    ParentImage|endswith:
      - '\WINWORD.EXE'
      - '\EXCEL.EXE'
      - '\POWERPNT.EXE'
      - '\MSPUB.EXE'
      - '\VISIO.EXE'
      - '\MSACCESS.EXE'
  selection_suspicious_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\regsvr32.exe'
      - '\rundll32.exe'
      - '\certutil.exe'
      - '\bitsadmin.exe'
      - '\wmic.exe'
      - '\msiexec.exe'
      - '\curl.exe'
      - '\wget.exe'
  filter_update:
    # Filter known Office update processes
    CommandLine|contains:
      - 'OfficeC2RClient.exe'
      - 'OfficeScrubScenario'
  filter_accessibility:
    Image|endswith:
      - '\OSPPSVC.EXE'
      - '\splwow64.exe'
  condition: selection_office_parent and selection_suspicious_child and not filter_update and not filter_accessibility
falsepositives:
  - Legitimate macros used for business automation — require review and whitelisting
  - Some Office plugins may spawn child processes
  - PDF converters launched from Office
  - Tune filter for known-legitimate macro use cases in your environment
level: critical
fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - ProcessId
response:
  - Immediately quarantine the endpoint
  - Collect memory image before isolation
  - Identify the document that triggered the macro (check Office MRU registry)
  - Extract and analyse the document for full macro code
  - Check for outbound C2 connections from the same host
  - Identify email that delivered the document; check for other recipients
  - Block sender domain at email gateway
playbook: https://github.com/reninjk/soc-incident-response/blob/main/playbooks/phishing-response.md
