title: Internal Network Reconnaissance Activity
id: 5e1c8d3f-4a7b-4e9c-b8f2-7d3a5c9e1b6f
status: production
description: Detects network reconnaissance activity such as port scanning, ping sweeps,
  and enumeration tools commonly used post-compromise to map internal network assets
  before lateral movement.
references:
  - https://attack.mitre.org/techniques/T1046/
  - https://attack.mitre.org/techniques/T1018/
author: SOC Team
date: 2026-01-01
tags:
  - attack.discovery
  - attack.t1046
  - attack.t1018
  - attack.t1082
logsource:
  category: process_creation
  product: windows
detection:
  selection_recon_tools:
    Image|endswith:
      - '\nmap.exe'
      - '\masscan.exe'
      - '\zmap.exe'
      - '\netdiscover.exe'
      - '\arp-scan.exe'
      - '\angry_ip_scanner.exe'
  selection_native_recon:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
      - '\nltest.exe'
      - '\ping.exe'
      - '\arp.exe'
      - '\nslookup.exe'
      - '\ipconfig.exe'
      - '\nbtscan.exe'
      - '\whoami.exe'
    CommandLine|contains:
      - '/domain'
      - 'domain_trusts'
      - 'dclist'
      - 'group "Domain Admins"'
      - 'group "Enterprise Admins"'
      - 'localgroup administrators'
  selection_powershell_recon:
    CommandLine|contains:
      - 'Get-NetComputer'
      - 'Get-NetDomain'
      - 'Get-NetUser'
      - 'Get-ADComputer'
      - 'Get-ADUser'
      - 'Invoke-PortScan'
      - 'Test-NetConnection'
      - '1..254'       # Typical ping sweep loop pattern
  filter_admin_tools:
    # Known legitimate admin workstations
    ParentImage|endswith:
      - '\mmc.exe'
      - '\ServerManager.exe'
    User|contains: 'admin'
  condition: >
    selection_recon_tools
    or selection_powershell_recon
    or (selection_native_recon and not filter_admin_tools)
falsepositives:
  - Legitimate network administrators performing audits
  - IT asset management tools
  - Vulnerability scanners (Nessus, Qualys agent)
  - Tune filter_admin_tools with known scanner IPs/accounts
level: medium
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
  - ComputerName
response:
  - Determine if user/host is authorised to perform network scanning
  - Check for other post-exploitation indicators on the same host
  - Correlate with authentication events (unusual logons from this host)
  - If not authorised, treat as active lateral movement preparation
playbook: https://github.com/reninjk/soc-incident-response/blob/main/playbooks/malware-detection.md
