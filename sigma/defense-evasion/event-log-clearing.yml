title: Windows Event Log Clearing
id: 2f7a4e9d-1c8b-4f3a-b2e7-5d9c1a4f8e2b
status: production
description: Detects clearing of Windows Event Logs, a common defense evasion technique
  used by threat actors to remove evidence of their activity. Any log clearing outside
  of authorised maintenance windows should be treated as highly suspicious.
references:
  - https://attack.mitre.org/techniques/T1070/001/
  - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-1102
author: SOC Team
date: 2026-01-01
tags:
  - attack.defense_evasion
  - attack.t1070.001
logsource:
  product: windows
  service: security
detection:
  selection_security_log_cleared:
    EventID: 1102
    # Security log cleared — always high priority
  selection_other_log_cleared:
    EventID: 104
    # System/Application log cleared
  selection_wevtutil:
    # Clearing logs via wevtutil command line
    EventID: 4688
    CommandLine|contains:
      - 'wevtutil'
    CommandLine|contains:
      - ' cl '
      - ' clear-log '
  selection_powershell_clear:
    # Clearing logs via PowerShell
    CommandLine|contains:
      - 'Clear-EventLog'
      - 'Remove-EventLog'
      - 'Limit-EventLog'
  filter_maintenance:
    # Tune with authorised maintenance accounts/times
    SubjectUserName|endswith: '-svc'
    # Example: filter scheduled maintenance jobs
  condition: >
    selection_security_log_cleared
    or selection_other_log_cleared
    or (selection_wevtutil and not filter_maintenance)
    or selection_powershell_clear
falsepositives:
  - Scheduled log rotation tasks (tune filter_maintenance)
  - Authorised system maintenance
  - Log management software
  - Strongly recommend: create allow-list of authorised maintenance accounts
level: high
fields:
  - EventID
  - SubjectUserName
  - SubjectDomainName
  - CommandLine
  - Channel
response:
  - This is a critical indicator — treat as active incident until proven otherwise
  - Identify WHO cleared the log and from which system
  - Check for other defence evasion indicators on the host
  - Recover logs from SIEM (may have captured events before clearing)
  - Check backup/copy of logs if centralised logging was active
  - Isolate host if part of active incident
playbook: https://github.com/reninjk/soc-incident-response/blob/main/playbooks/malware-detection.md
