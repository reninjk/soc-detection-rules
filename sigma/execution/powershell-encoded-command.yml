title: PowerShell Encoded Command Execution
id: 7b3f2a91-4c8e-4d2f-9a1b-8e5c7f0d3a2e
status: production
description: Detects PowerShell execution with Base64-encoded commands, a common technique
  used by threat actors to obfuscate malicious payloads and evade command-line detection.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://lolbas-project.github.io/lolbas/Binaries/Powershell/
author: SOC Team
date: 2026-01-01
modified: 2026-01-01
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    - Image|endswith:
        - '\powershell.exe'
        - '\pwsh.exe'
    - OriginalFileName:
        - 'PowerShell.EXE'
        - 'pwsh.dll'
  selection_encoded:
    CommandLine|contains:
      - ' -EncodedCommand '
      - ' -encodedcommand '
      - ' -enc '
      - ' -EC '
      - ' -En '
  filter_legitimate:
    # Known legitimate software using encoded commands - tune per environment
    ParentImage|endswith:
      - '\Microsoft.ConfigurationManagement.exe'
      - '\ccmexec.exe'
  condition: (selection_img and selection_encoded) and not filter_legitimate
falsepositives:
  - Legitimate software deployment tools (SCCM, Intune) using encoded commands
  - Some monitoring agents
  - Developer tooling (VS Code, Azure CLI)
  - Tune filter_legitimate per environment
level: high
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - Image
  - ParentImage
response:
  - Decode the Base64 payload for analysis
  - Check parent process for signs of initial access
  - Review host for additional compromise indicators
  - Correlate with network events for C2 beaconing
playbook: https://github.com/reninjk/soc-incident-response/blob/main/playbooks/malware-detection.md
